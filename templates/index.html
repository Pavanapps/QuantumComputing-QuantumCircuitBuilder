<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Quantum Circuit Builder Lite</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h1>⚛ Quantum Circuit Builder Lite</h1>

<div class="glass">

<label>Number of Qubits</label>

<select id="qubits">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
</select>

<label>Gate</label>

<select id="gate">
<option>H</option>
<option>X</option>
<option>Y</option>
<option>Z</option>
<option>S</option>
<option>T</option>
</select>

<label>Qubit</label>

<select id="qubit">
<option>0</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
</select>

<button onclick="addGate()">Add Gate</button>

</div>

<div class="glass">

<h2>Circuit</h2>

<table id="circuitTable">

<tr>
<th>Gate</th>
<th>Qubit</th>
</tr>

</table>

</div>

<div class="buttons">

<button onclick="runCircuit()">
Run Circuit
</button>

</div>

<div class="glass">

<h2>Results</h2>

<pre id="results"></pre>

</div>

<div class="glass">

<h2>Probability Histogram</h2>

<canvas id="chart"></canvas>

</div>

<div class="glass">

<h2>Generated Qiskit Code</h2>

<pre id="code"></pre>

</div>

</div>

<script src="{{ url_for('static',
filename='script.js') }}"></script>

</body>
</html>
