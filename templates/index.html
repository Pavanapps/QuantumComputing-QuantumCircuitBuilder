<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quantum Circuit Builder Pro</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

<header>

    <h1>⚛ Quantum Circuit Builder Pro</h1>

    <p>Build • Visualize • Simulate Quantum Circuits</p>

</header>

<div class="dashboard">

    <!-- LEFT PANEL -->

    <div class="card">

        <h2>Circuit Builder</h2>

        <label>Number of Qubits</label>

        <select id="qubits">

            <option>1</option>
            <option selected>2</option>
            <option>3</option>
            <option>4</option>
            <option>5</option>

        </select>

        <button id="new-circuit" class="primary">
    Create Circuit
</button>

        <label>Select Gate</label>

        <div class="gate-grid">

                <button class="gate-btn" data-gate="H">H</button>
                <button class="gate-btn" data-gate="X">X</button>
                <button class="gate-btn" data-gate="Y">Y</button>
                <button class="gate-btn" data-gate="Z">Z</button>
                <button class="gate-btn" data-gate="S">S</button>
                <button class="gate-btn" data-gate="T">T</button>

        </div>

        <label>Target Qubit</label>

        <select id="target">

            <option>q0</option>
            <option>q1</option>

        </select>

        <button id="apply-gate" class="primary">
    Apply Gate
</button>

        <button id="reset" class="secondary">
    Reset Circuit
</button>

    </div>

    <!-- CENTER -->

    <div class="card">

        <h2>Circuit Preview</h2>

        <div class="preview">

            <h3>Quantum Circuit</h3>

            <img
    id="circuit-image"
    src=""
    alt="Quantum Circuit"
    style="max-width:100%;"
>

        </div>

    </div>

    <!-- RIGHT -->

    <div class="card">

        <h2>Statistics</h2>

        <div id="stats"></div>

       <div id="stats"></div>

       <div id="stats"></div>

        <div id="stats"></div>

    </div>

</div>

<div class="bottom">

    <div class="card">

        <h2>Simulation Results</h2>

<div id="statevector"></div>

    </div>

    <div class="card">

        <h2>Measurement Counts</h2>

        <div id="counts"></div>

    </div>

</div>

<div class="actions">

    <button id="simulate" class="success">
    Run Simulation
</button>

    <button id="download" class="download">
    Download PNG
</button>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
