<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Quantum Circuit Builder Pro</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

</head>

<body>

<header class="header">

    <h1>
        <i class="bi bi-cpu"></i>
        Quantum Circuit Builder Pro
    </h1>

</header>

<main class="main-layout">

    <!-- LEFT PANEL -->

    <aside class="card control-panel">

        <h2>Circuit Controls</h2>

        <div class="form-group">

            <label>Number of Qubits</label>

            <select id="qubits">

                <option value="1">1</option>
                <option value="2" selected>2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>

            </select>

        </div>

        <button
            id="new-circuit"
            class="btn btn-primary">

            <i class="bi bi-plus-circle"></i>

            Create Circuit

        </button>

        <hr>

        <div class="form-group">

            <label>Quantum Gate</label>

            <select id="gate">

                <optgroup label="Single Qubit">

                    <option value="H">Hadamard</option>
                    <option value="X">Pauli X</option>
                    <option value="Y">Pauli Y</option>
                    <option value="Z">Pauli Z</option>
                    <option value="S">Phase S</option>
                    <option value="T">Phase T</option>

                </optgroup>

                <optgroup label="Two Qubit">

                    <option value="CX">Controlled X</option>
                    <option value="CZ">Controlled Z</option>
                    <option value="SWAP">SWAP</option>

                </optgroup>

            </select>

        </div>

        <div class="form-group">

            <label>Target Qubit</label>

            <select id="target-qubit"></select>

        </div>

        <div
            id="control-container"
            class="form-group"
            style="display:none;">

            <label>Control Qubit</label>

            <select id="control-qubit"></select>

        </div>

        <button
            id="apply-gate"
            class="btn btn-success">

            <i class="bi bi-lightning-charge"></i>

            Apply Gate

        </button>

    </aside>

    <!-- CENTER -->

    <section class="card preview-panel">

        <h2>Circuit Preview</h2>

        <div class="preview-area">

            <img
                id="circuit-image"
                src="/circuit_image"
                alt="Circuit Preview">

        </div>

    </section>

    <!-- RIGHT -->

    <aside class="card statistics-panel">

        <h2>Statistics</h2>

        <div id="statistics">

            <div class="stat-row">

                <span>Qubits</span>

                <span id="stat-qubits">0</span>

            </div>

            <div class="stat-row">

                <span>Depth</span>

                <span id="stat-depth">0</span>

            </div>

            <div class="stat-row">

                <span>Gate Count</span>

                <span id="stat-gates">0</span>

            </div>

            <div class="stat-row">

                <span>Measurements</span>

                <span id="stat-measurements">0</span>

            </div>

        </div>

    </aside>

</main>

<section class="results-layout">

    <div class="card">

        <h2>Measurement Counts</h2>

        <div id="counts"></div>

    </div>

    <div class="card">

        <h2>Statevector</h2>

        <div id="statevector"></div>

    </div>

    <div class="card">

        <h2>Histogram</h2>

        <canvas id="histogramChart"></canvas>

    </div>

</section>

<section class="toolbar">

    <button id="simulate" class="btn btn-warning">
        <i class="bi bi-play-fill"></i>
        Run Simulation
    </button>

    <button id="reset" class="btn">
        Reset
    </button>

    <button id="undo" class="btn">
        Undo
    </button>

    <button id="redo" class="btn">
        Redo
    </button>

    <button id="save-project" class="btn">
        Save
    </button>

    <button id="load-project" class="btn">
        Load
    </button>

    <button id="export-qasm" class="btn">
        Export QASM
    </button>

    <button id="download" class="btn">
        PNG
    </button>

</section>

<input
    type="file"
    id="project-file"
    hidden>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
